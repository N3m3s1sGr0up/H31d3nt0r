name: Argus Secrets Scan (Callable)
# Reusable workflow that runs Argus (N3m3s1sGr0up/Argus — the org's internal,
# upstream-tracked fork of Praetorian Titus) against the caller's repository to
# detect leaked secrets, credentials, and API keys. Language agnostic — works on
# Go, TypeScript, Python, YAML, or any repo.
#
# Access: invocable from any repo in the N3m3s1sGr0up org
# (Settings -> Actions -> General -> Access -> Accessible from repositories in
# the 'N3m3s1sGr0up' organization).
#
# PRIVATE TOOL: Argus is a private module, so `go install` needs read access to
# the Argus repo. This workflow authenticates with a READ-ONLY deploy key bound
# to N3m3s1sGr0up/Argus (not a user PAT, not org-wide), loaded into a private
# ssh-agent. The caller passes it as `secrets: { argus-deploy-key: <PEM> }` (org
# Actions secret ARGUS_DEPLOY_KEY). GitHub's SSH host keys are pinned from the
# TLS-authenticated api.github.com/meta endpoint (no TOFU). The key is never
# echoed and the agent is killed at the end of the step.
#
# See templates/callers/argus.yml for the thin caller. Grant all three
# permissions (contents:read, security-events:write, actions:read) in the caller
# regardless of repo visibility — the argus job statically declares them, so a
# missing scope re-triggers a logless startup_failure even when SARIF upload is
# skipped at runtime on a private repo.

on:
  workflow_call:
    inputs:
      argus-ref:
        description: "Pinned Argus git ref (full commit SHA). Never use 'main'/'latest'."
        required: false
        type: string
        default: "5d1c01d5985cea12528453bdb092382a56cdcebf"
      scan-target:
        description: "Target to scan (default: current directory)."
        required: false
        type: string
        default: "."
      scan-args:
        description: "Additional arguments passed to 'argus scan'."
        required: false
        type: string
        default: "--format sarif --output :memory:"
      scan-git-history:
        description: "Whether to scan git history (--git flag)."
        required: false
        type: boolean
        default: false
      upload-sarif:
        description: "Upload SARIF to the Security tab. Auto-skipped on non-public repos unless force-upload-private is set."
        required: false
        type: boolean
        default: true
      force-upload-private:
        description: "Upload SARIF even on private repos (requires GitHub Advanced Security)."
        required: false
        type: boolean
        default: false
      fail-on-findings:
        description: "Fail the job if Argus finds secrets. Default true (fail-closed)."
        required: false
        type: boolean
        default: true
      enable-harden-runner:
        description: "Whether to install StepSecurity Harden-Runner."
        required: false
        type: boolean
        default: true
      harden-runner-policy:
        description: "Harden-Runner egress policy: 'audit' or 'block'."
        required: false
        type: string
        default: "audit"
      harden-runner-allowed-endpoints:
        description: "Newline-separated allowed endpoints for block mode."
        required: false
        type: string
        default: ""
    secrets:
      argus-deploy-key:
        description: "Read-only SSH deploy key (private PEM) bound to N3m3s1sGr0up/Argus, used only to `go install` the private Argus module."
        required: true

permissions:
  contents: read

jobs:
  # Preflight: skip scanning if a PR only touches docs/images, but ALWAYS report
  # a passing required check (no permanent-pending deadlock). Always scans on
  # push-to-main, schedule, and workflow_dispatch.
  preflight:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      should_scan: ${{ steps.check.outputs.should_scan }}
      visibility: ${{ steps.repo.outputs.visibility }}
    steps:
      - name: Harden Runner
        if: ${{ inputs.enable-harden-runner }}
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: ${{ inputs.harden-runner-policy }}
          allowed-endpoints: ${{ inputs.harden-runner-allowed-endpoints }}
          disable-sudo-and-containers: true

      - name: Resolve repository visibility
        id: repo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -eu
          VIS=$(gh api "repos/$REPO" --jq '.visibility' 2>/dev/null || echo "")
          [ -n "$VIS" ] || VIS="unknown"
          echo "visibility=$VIS" >> "$GITHUB_OUTPUT"
          echo "Repository visibility: $VIS"

      - name: Check for scannable changes
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          REPO: ${{ github.repository }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -eu

          # Non-PR events always scan (push to main, schedule, workflow_dispatch).
          if [ "$EVENT_NAME" != "pull_request" ]; then
            echo "should_scan=true" >> "$GITHUB_OUTPUT"
            echo "Non-PR event ($EVENT_NAME) — secrets scan will run."
            exit 0
          fi

          # Dependabot PRs change no scannable source (only dependency pins) and
          # can't read the Argus deploy key anyway; zizmor still enforces hash-pins.
          # Skip-as-pass so the required check is green without running the scan.
          if [ "$PR_AUTHOR" = "dependabot[bot]" ]; then
            echo "should_scan=false" >> "$GITHUB_OUTPUT"
            echo "Dependabot PR — argus scan skipped (zizmor still enforces hash-pins). Check still passes."
            exit 0
          fi

          # Detect changed files via the compare API (needs only contents:read).
          # Fail open (scan) if the call fails — never silently skip.
          if ! FILES=$(gh api "repos/$REPO/compare/$BASE_SHA...$HEAD_SHA" --jq '.files[]?.filename' 2>/dev/null); then
            echo "should_scan=true" >> "$GITHUB_OUTPUT"
            echo "Could not list changed files — scanning to be safe."
            exit 0
          fi
          COUNT=$(printf '%s\n' "$FILES" | grep -c . || true)

          # The compare endpoint caps .files at 300; on a larger diff, scan.
          if [ "$COUNT" -ge 300 ]; then
            echo "should_scan=true" >> "$GITHUB_OUTPUT"
            echo "Large diff (>=300 changed files) — scanning to be safe."
            exit 0
          fi

          echo "Changed files in PR ($COUNT total):"
          printf '%s\n' "$FILES" | sed 's/^/  /'

          # Only skip on pure docs/images — secrets can hide in any code/config.
          SKIP_RE='\.(md|markdown|rst|txt|png|jpg|jpeg|svg|gif|webp|ico)$|^LICENSE$|^docs/'
          if printf '%s\n' "$FILES" | grep -vE "$SKIP_RE" | grep -q .; then
            echo "should_scan=true" >> "$GITHUB_OUTPUT"
            echo "Scannable changes detected — Argus will run."
          else
            echo "should_scan=false" >> "$GITHUB_OUTPUT"
            echo "Docs/images-only PR — secrets scan skipped (check still passes)."
          fi

  argus:
    name: Argus Secrets Scan
    needs: preflight
    if: needs.preflight.outputs.should_scan == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Harden Runner
        if: ${{ inputs.enable-harden-runner }}
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: ${{ inputs.harden-runner-policy }}
          allowed-endpoints: ${{ inputs.harden-runner-allowed-endpoints }}
          disable-sudo-and-containers: true

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "stable"
          cache: false

      - name: Install Argus
        env:
          ARGUS_REF: ${{ inputs.argus-ref }}
          ARGUS_DEPLOY_KEY: ${{ secrets.argus-deploy-key }}
        run: |
          set -eu
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          # Pin GitHub's CURRENT SSH host keys from the TLS-authenticated meta
          # API — no TOFU, no ssh-keyscan, no stale hardcoded fingerprints.
          curl -fsS https://api.github.com/meta \
            | python3 -c "import sys,json; [print('github.com', k) for k in json.load(sys.stdin)['ssh_keys']]" \
            > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          # Load the read-only Argus deploy key into an ephemeral agent.
          eval "$(ssh-agent -s)"
          printf '%s\n' "$ARGUS_DEPLOY_KEY" | ssh-add - >/dev/null 2>&1
          # Fetch the private module over SSH; GOPRIVATE keeps it off the proxy.
          git config --global url."git@github.com:N3m3s1sGr0up/".insteadOf "https://github.com/N3m3s1sGr0up/"
          export GOPRIVATE="github.com/N3m3s1sGr0up/*"
          export GOFLAGS="-mod=mod"
          go install "github.com/N3m3s1sGr0up/Argus/cmd/argus@${ARGUS_REF}"
          # Tear down auth so it cannot leak into later steps.
          git config --global --unset-all url."git@github.com:N3m3s1sGr0up/".insteadOf || true
          ssh-agent -k >/dev/null 2>&1 || true

      - name: Run Argus scan
        shell: bash
        env:
          SCAN_TARGET: ${{ inputs.scan-target }}
          SCAN_ARGS: ${{ inputs.scan-args }}
          SCAN_GIT: ${{ inputs.scan-git-history }}
          FAIL_ON_FINDINGS: ${{ inputs.fail-on-findings }}
        run: |
          set +e

          GIT_FLAG=""
          if [ "$SCAN_GIT" = "true" ]; then
            GIT_FLAG="--git"
          fi

          argus scan $SCAN_TARGET $SCAN_ARGS $GIT_FLAG > argus-results.sarif 2> argus-stderr.log
          EXIT=$?

          echo "Argus exit code: $EXIT"
          # Do NOT echo stderr verbatim — it can contain matched secret material.
          # Surface only that there was diagnostic output; rotate on any finding.
          if [ -s argus-stderr.log ]; then
            echo "::warning::Argus produced diagnostic output (suppressed to avoid leaking matched material). Treat any finding as an incident and rotate the credential."
          fi

          # Validate SARIF; write empty SARIF if malformed so upload succeeds.
          if [ ! -s argus-results.sarif ] || ! python3 -c "import json,sys; json.load(open('argus-results.sarif'))" 2>/dev/null; then
            echo "::warning::Argus did not produce valid SARIF (exit=$EXIT). Writing empty SARIF."
            cat > argus-results.sarif <<'SARIF_EOF'
          {
            "version": "2.1.0",
            "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json",
            "runs": []
          }
          SARIF_EOF
          fi

          if [ "$FAIL_ON_FINDINGS" = "true" ] && [ $EXIT -ne 0 ]; then
            echo "::error::Argus found secrets (exit=$EXIT) and fail-on-findings is enabled."
            exit $EXIT
          fi

      - name: Note SARIF upload skipped
        if: ${{ always() && inputs.upload-sarif && needs.preflight.outputs.visibility != 'public' && !inputs.force-upload-private }}
        env:
          VIS: ${{ needs.preflight.outputs.visibility }}
        run: |
          echo "::notice::SARIF upload skipped — repository visibility is '$VIS' (not public). The scan ran and fail-on-findings gating is unaffected."

      - name: Upload Argus SARIF
        if: ${{ always() && inputs.upload-sarif && (needs.preflight.outputs.visibility == 'public' || inputs.force-upload-private) }}
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          sarif_file: argus-results.sarif
          category: argus-secrets
