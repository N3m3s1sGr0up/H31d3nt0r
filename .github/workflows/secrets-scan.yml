name: Secrets Scan
on:
  pull_request: { branches: [main] }
  push: { branches: [main] }
  schedule:
    - cron: "0 7 * * 1" # weekly baseline
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  # Vendored local reusable (this repo is PUBLIC and cannot call the private hub).
  titus:
    uses: ./.github/workflows/_titus-reusable.yml
    permissions:
      contents: read
      security-events: write
      actions: read
