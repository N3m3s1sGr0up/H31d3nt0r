name: Secrets Scan
on:
  pull_request: { branches: [main] }
  push: { branches: [main] }
  schedule:
    - cron: "0 7 * * 1" # weekly baseline
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  # Vendored local reusable (this repo is PUBLIC and cannot call the private hub).
  argus:
    uses: ./.github/workflows/_argus-reusable.yml
    permissions:
      contents: read
      security-events: write
      actions: read
    secrets:
      # Argus is a private module; fork PRs (no secrets) will fail to mint a
      # token — expected. Merge from an org branch where the app PEM is available.
      argus-deploy-key: ${{ secrets.ARGUS_DEPLOY_KEY }}
