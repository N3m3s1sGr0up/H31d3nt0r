name: CI

on:
  push:
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run actions:verify
      - run: npm run version:verify
      - run: npm audit --omit=dev --audit-level=high
      - run: npm run typecheck
      - run: npm test

  integration:
    needs: unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Integration tests (skipped without CURSOR_API_KEY)
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          BRIDGE_API_KEY: ${{ secrets.BRIDGE_API_KEY || 'ci-bridge-key-not-for-production' }}
        run: |
          if [ -z "$CURSOR_API_KEY" ]; then
            echo "CURSOR_API_KEY not configured; skipping integration tests."
            exit 0
          fi
          npm run test:integration
