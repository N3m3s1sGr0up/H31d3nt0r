name: CI

on:
  push:
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4.3.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run actions:verify
      - run: npm run version:verify
      - run: npm audit --omit=dev --audit-level=high
      - run: npm run typecheck
      - run: npm test

  integration:
    needs: unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4.3.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Integration tests (skipped without CURSOR_API_KEY)
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          BRIDGE_API_KEY: ${{ secrets.BRIDGE_API_KEY || 'ci-bridge-key-not-for-production' }}
        run: |
          if [ -z "$CURSOR_API_KEY" ]; then
            echo "CURSOR_API_KEY not configured; skipping integration tests."
            exit 0
          fi
          npm run test:integration
