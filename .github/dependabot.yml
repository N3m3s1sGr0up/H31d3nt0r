version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(dev-deps)"
    groups:
      # Roll routine minor/patch bumps into a single weekly PR to cut churn.
      # Major upgrades still arrive as individual PRs for explicit review.
      npm-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
